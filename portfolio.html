<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio — Webbio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#080810; --surface:#0f0f1a; --surface2:#13131f;
      --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.1);
      --text:#f0f0ff; --muted:rgba(200,200,230,0.45);
      --accent:#7c6af7; --accent2:#a78bfa; --accent-glow:rgba(124,106,247,0.18);
      --green:#34d399; --gold:#fbbf24;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}
    a{color:inherit;text-decoration:none;}

    /* NOISE */
    body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.025;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size:180px;}

    /* LOADER */
    #loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s,visibility .5s;}
    #loader.hide{opacity:0;visibility:hidden;}
    .loader-logo{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-1px;margin-bottom:28px;background:linear-gradient(135deg,#fff 40%,#7c6af7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .loader-bar-wrap{width:160px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
    .loader-bar{height:100%;background:var(--accent);border-radius:2px;animation:load 1.1s cubic-bezier(.4,0,.2,1) forwards;}
    @keyframes load{from{width:0}to{width:100%}}

    /* NOT FOUND */
    #not-found{display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:60px;gap:14px;position:relative;z-index:1;}
    #not-found .big{font-family:'Syne',sans-serif;font-size:120px;font-weight:800;color:rgba(255,255,255,.04);line-height:1;}
    #not-found h2{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;margin-top:-30px;}
    #not-found p{color:var(--muted);margin-bottom:6px;}
    #not-found a{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;padding:12px 28px;border-radius:100px;font-weight:500;font-size:14px;transition:opacity .2s;}
    #not-found a:hover{opacity:.85;}

    /* SCROLL REVEAL */
    .reveal{opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.2,.8,.3,1),transform .7s cubic-bezier(.2,.8,.3,1);}
    .reveal.visible{opacity:1;transform:none;}

    /* ── NAV ── */
    .pf-nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 60px;display:flex;align-items:center;justify-content:space-between;background:rgba(8,8,16,0);backdrop-filter:blur(0);border-bottom:1px solid transparent;transition:all .4s;}
    .pf-nav.scrolled{background:rgba(8,8,16,.82);backdrop-filter:blur(20px);border-bottom-color:var(--border);}
    .pf-nav-logo{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;letter-spacing:-.5px;opacity:.5;}
    .pf-nav-links{display:flex;gap:28px;}
    .pf-nav-links a{font-size:13px;font-weight:500;color:var(--muted);transition:color .2s;}
    .pf-nav-links a:hover{color:#fff;}
    .pf-nav-cta{background:var(--accent);color:#fff;font-size:13px;font-weight:600;padding:8px 20px;border-radius:100px;transition:all .2s;}
    .pf-nav-cta:hover{opacity:.85;transform:translateY(-1px);}

    /* ── HERO ── */
    .pf-hero{min-height:100vh;display:flex;align-items:center;padding:120px 80px 80px;position:relative;overflow:hidden;}
    .hero-bg-orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;}
    .hero-bg-orb.orb1{width:600px;height:600px;background:rgba(124,106,247,.1);top:-100px;right:-100px;}
    .hero-bg-orb.orb2{width:400px;height:400px;background:rgba(52,211,153,.07);bottom:-50px;left:-80px;}
    .hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.014) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.014) 1px,transparent 1px);background-size:64px 64px;}
    .pf-hero-inner{position:relative;z-index:1;display:flex;align-items:center;gap:80px;width:100%;max-width:1200px;margin:0 auto;}
    .pf-hero-text{flex:1;}

    .pf-avail{display:inline-flex;align-items:center;gap:8px;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);color:var(--green);font-size:12px;font-weight:500;padding:6px 16px;border-radius:100px;margin-bottom:28px;}
    .pf-avail .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

    .pf-hero-role{font-size:13px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--accent2);margin-bottom:14px;}
    .pf-hero-name{font-family:'Syne',sans-serif;font-size:clamp(44px,5.5vw,76px);font-weight:800;line-height:1.0;letter-spacing:-2.5px;margin-bottom:22px;background:linear-gradient(160deg,#fff 40%,rgba(255,255,255,.5));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .pf-hero-bio{font-size:17px;line-height:1.85;color:var(--muted);max-width:520px;margin-bottom:40px;font-weight:300;}
    .pf-hero-actions{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:44px;}

    .btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;padding:14px 28px;border-radius:100px;transition:all .25s;box-shadow:0 0 30px rgba(124,106,247,.3);}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 40px rgba(124,106,247,.5);}
    .btn-outline{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border2);color:rgba(255,255,255,.7);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;padding:13px 24px;border-radius:100px;transition:all .25s;}
    .btn-outline:hover{border-color:var(--accent2);color:#fff;}

    .pf-socials{display:flex;gap:10px;flex-wrap:wrap;}
    .pf-social{display:inline-flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-size:12px;font-weight:500;padding:8px 14px;border-radius:10px;transition:all .2s;}
    .pf-social:hover{border-color:var(--accent);color:#fff;background:var(--accent-glow);}
    .pf-social svg{width:14px;height:14px;}

    /* ── AVATAR ── */
    .pf-avatar-wrap{flex-shrink:0;position:relative;}
    .pf-avatar-ring{width:300px;height:300px;border-radius:40% 60% 55% 45% / 45% 55% 60% 40%;background:linear-gradient(135deg,var(--accent),#a78bfa,#34d399);padding:3px;animation:morph 8s ease-in-out infinite;}
    @keyframes morph{0%,100%{border-radius:40% 60% 55% 45% / 45% 55% 60% 40%}33%{border-radius:55% 45% 40% 60% / 55% 40% 65% 45%}66%{border-radius:45% 55% 65% 35% / 40% 60% 45% 55%}}
    .pf-avatar-inner{width:100%;height:100%;border-radius:inherit;background:var(--surface);overflow:hidden;display:flex;align-items:center;justify-content:center;}
    .pf-avatar-inner img{width:100%;height:100%;object-fit:cover;}
    .pf-avatar-initials{font-family:'Syne',sans-serif;font-size:60px;font-weight:800;background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .pf-avatar-badge{position:absolute;bottom:16px;right:-12px;background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:12px 18px;backdrop-filter:blur(10px);box-shadow:0 20px 40px rgba(0,0,0,.4);}
    .pf-avatar-badge .bn{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#fff;}
    .pf-avatar-badge .bl{font-size:10px;color:var(--muted);letter-spacing:.5px;}

    /* ── SECTIONS ── */
    .pf-section{padding:100px 80px;border-top:1px solid var(--border);}
    .pf-section-inner{max-width:1200px;margin:0 auto;}
    .section-label{display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent2);margin-bottom:12px;}
    .section-label::before{content:'';display:block;width:20px;height:2px;background:linear-gradient(90deg,var(--accent),transparent);}
    .section-title{font-family:'Syne',sans-serif;font-size:clamp(28px,3.5vw,44px);font-weight:800;letter-spacing:-1px;margin-bottom:52px;line-height:1.1;}
    .section-title em{font-style:normal;color:var(--accent2);}

    /* ── SKILLS ── */
    .skills-cloud{display:flex;flex-wrap:wrap;gap:10px;}
    .skill-chip{background:var(--surface2);border:1px solid var(--border);color:rgba(255,255,255,.75);font-size:13px;font-weight:500;padding:9px 20px;border-radius:100px;transition:all .2s;cursor:default;position:relative;overflow:hidden;}
    .skill-chip::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent),#a78bfa);opacity:0;transition:opacity .2s;}
    .skill-chip:hover::after{opacity:.1;}
    .skill-chip:hover{border-color:rgba(124,106,247,.4);color:#fff;transform:translateY(-2px);}
    .skill-chip span{position:relative;z-index:1;}

    /* ── EXPERIENCE ── */
    .timeline{position:relative;padding-left:32px;}
    .timeline::before{content:'';position:absolute;left:0;top:8px;bottom:0;width:1px;background:linear-gradient(to bottom,var(--accent),rgba(124,106,247,.1));}
    .tl-item{position:relative;margin-bottom:52px;}
    .tl-item:last-child{margin-bottom:0;}
    .tl-dot{position:absolute;left:-37px;top:6px;width:11px;height:11px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);box-shadow:0 0 14px rgba(124,106,247,.7);}
    .tl-header{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:8px;flex-wrap:wrap;}
    .tl-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;}
    .tl-period{font-size:12px;font-weight:600;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:4px 12px;border-radius:100px;white-space:nowrap;flex-shrink:0;}
    .tl-company{display:inline-flex;align-items:center;gap:6px;margin-bottom:12px;font-size:13px;font-weight:600;color:var(--accent2);}
    .tl-desc{font-size:14px;color:var(--muted);line-height:1.8;}

    /* ── PROJECTS ── */
    .projects-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;}
    .proj-card{background:var(--surface2);border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:all .35s cubic-bezier(.2,.8,.3,1);}
    .proj-card:hover{border-color:rgba(124,106,247,.35);transform:translateY(-6px);box-shadow:0 28px 60px rgba(0,0,0,.5),0 0 0 1px rgba(124,106,247,.12);}
    .proj-media{width:100%;height:210px;position:relative;overflow:hidden;background:#0d0d20;}
    .proj-media img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
    .proj-card:hover .proj-media img{transform:scale(1.05);}
    .proj-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:linear-gradient(135deg,#0d0d22,#121228);}
    .proj-placeholder::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(124,106,247,.1),transparent 70%);}
    .proj-placeholder .pi{font-family:'Syne',sans-serif;font-size:64px;font-weight:800;color:rgba(124,106,247,.12);position:relative;}
    .proj-overlay{position:absolute;inset:0;background:rgba(8,8,16,.7);display:flex;align-items:center;justify-content:center;gap:10px;opacity:0;transition:opacity .25s;}
    .proj-card:hover .proj-overlay{opacity:1;}
    .ov-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:600;padding:9px 18px;border-radius:100px;backdrop-filter:blur(8px);transition:all .2s;}
    .ov-btn:hover{background:var(--accent);border-color:var(--accent);}
    .ov-btn svg{width:13px;height:13px;}
    .proj-body{padding:22px 24px 26px;}
    .proj-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
    .proj-tag{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--accent2);background:rgba(124,106,247,.1);border:1px solid rgba(124,106,247,.2);padding:3px 9px;border-radius:5px;}
    .proj-body h3{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px;}
    .proj-body p{font-size:13px;color:var(--muted);line-height:1.75;margin-bottom:18px;}
    .proj-links{display:flex;gap:10px;}
    .proj-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--accent2);border:1px solid rgba(124,106,247,.25);padding:7px 16px;border-radius:100px;transition:all .2s;}
    .proj-link:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
    .proj-link svg{width:12px;height:12px;}

    /* ── EDUCATION ── */
    .edu-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
    .edu-card{background:var(--surface2);border:1px solid var(--border);border-radius:18px;padding:30px;position:relative;overflow:hidden;transition:all .25s;}
    .edu-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent);}
    .edu-card:hover{border-color:rgba(124,106,247,.3);transform:translateY(-3px);}
    .edu-icon{font-size:30px;margin-bottom:16px;}
    .edu-card h3{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:6px;}
    .edu-school{font-size:14px;color:var(--accent2);font-weight:500;margin-bottom:6px;}
    .edu-year{font-size:12px;color:var(--muted);}
    .edu-extra{font-size:12px;color:var(--green);margin-top:10px;font-weight:500;}

    /* ── ACHIEVEMENTS ── */
    .ach-list{display:flex;flex-direction:column;gap:12px;}
    .ach-item{display:flex;align-items:center;gap:16px;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:18px 22px;transition:all .2s;}
    .ach-item:hover{border-color:rgba(251,191,36,.2);background:rgba(251,191,36,.03);}
    .ach-icon{font-size:22px;flex-shrink:0;}
    .ach-text{font-size:15px;font-weight:500;color:rgba(255,255,255,.85);}

    /* ── CONTACT ── */
    .contact-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
    .contact-card{display:flex;align-items:center;gap:16px;background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:20px 22px;transition:all .25s;}
    .contact-card:hover{border-color:rgba(124,106,247,.35);transform:translateY(-2px);}
    .contact-icon{width:46px;height:46px;border-radius:12px;background:var(--accent-glow);border:1px solid rgba(124,106,247,.2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
    .contact-label{font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;}
    .contact-value{font-size:14px;font-weight:500;color:#fff;}

    /* ── FOOTER ── */
    .pf-footer{padding:48px 80px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);}
    .pf-footer-logo{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;opacity:.25;}
    .pf-footer-text{font-size:12px;color:var(--muted);}
    .pf-footer-link{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border2);border-radius:100px;padding:6px 16px;font-size:11px;font-weight:600;color:var(--muted);transition:all .2s;}
    .pf-footer-link:hover{border-color:var(--accent);color:var(--accent2);}
    .pf-footer-link em{font-style:normal;color:var(--accent);}

    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:var(--bg);}
    ::-webkit-scrollbar-thumb{background:#1e1e32;border-radius:3px;}
    ::-webkit-scrollbar-thumb:hover{background:var(--accent);}

    @media(max-width:900px){
      .pf-nav{padding:14px 24px;}
      .pf-nav-links{display:none;}
      .pf-hero{padding:100px 24px 60px;}
      .pf-hero-inner{flex-direction:column-reverse;gap:36px;}
      .pf-avatar-ring{width:200px;height:200px;}
      .pf-avatar-initials{font-size:44px;}
      .pf-hero-name{font-size:40px;letter-spacing:-1px;}
      .pf-section{padding:60px 24px;}
      .projects-grid,.edu-grid,.contact-grid{grid-template-columns:1fr;}
      .tl-header{flex-direction:column;gap:8px;}
      .pf-footer{flex-direction:column;gap:12px;text-align:center;padding:32px 24px;}
    }
  </style>
</head>
<body>

<div id="loader">
  <div class="loader-logo">Webbio</div>
  <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
</div>

<div id="not-found">
  <div class="big">404</div>
  <h2>Portfolio not found</h2>
  <p>This page doesn't exist yet — but yours could.</p>
  <a href="builder.html">Build yours free →</a>
</div>

<div id="pf-root" style="display:none;position:relative;z-index:1;"></div>

<script>

    twitter:`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>`,
    mail:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 01-2.06 0L2 7"/></svg>`,
    phone:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>`,
    pin:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
    globe:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>`,
  };

  const initials = name => (name||'').split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');

  function getUsername() {
    const p = new URLSearchParams(window.location.search);
    if (p.get('u')) return p.get('u');
    const seg = window.location.pathname.split('/').filter(Boolean).pop();
    if (seg && !['portfolio.html','index.html','builder.html'].includes(seg)) return seg;
    return null;
  }

  function buildHTML(pd) {
    const d = pd.data;
    const exp  = d.experiences || [];
    const edu  = d.education   || [];
    const proj = d.projects    || [];
    const ach  = d.achievements|| [];
    const skl  = d.skills      || [];

    const navLinks = [skl.length&&'Skills', exp.length&&'Experience', proj.length&&'Projects', edu.length&&'Education', (d.email||d.phone)&&'Contact'].filter(Boolean);

    // Avatar
    const avatarInner = d.avatar
      ? `<img src="${d.avatar}" alt="${safe(d.name)}">`
      : `<div class="pf-avatar-initials">${initials(d.name)}</div>`;

    // Social pills
    const socials = [
      d.github   && `<a class="pf-social" href="${safe(d.github)}"   target="_blank">${SVG.github}   GitHub</a>`,
      d.linkedin && `<a class="pf-social" href="${safe(d.linkedin)}" target="_blank">${SVG.linkedin} LinkedIn</a>`,
      d.twitter  && `<a class="pf-social" href="${safe(d.twitter)}"  target="_blank">${SVG.twitter}  Twitter</a>`,
      d.website  && `<a class="pf-social" href="${safe(d.website)}"  target="_blank">${SVG.globe}    Website</a>`,
    ].filter(Boolean).join('');

    // Skills
    const skillsHTML = skl.length ? `
    <section class="pf-section" id="Skills">
      <div class="pf-section-inner">
        <div class="section-label reveal">Skills & Tech</div>
        <h2 class="section-title reveal" style="transition-delay:.1s">What I <em>work with</em></h2>
        <div class="skills-cloud">
          ${skl.map((s,i)=>`<div class="skill-chip reveal" style="transition-delay:${.05+i*.035}s"><span>${safe(s)}</span></div>`).join('')}
        </div>
      </div>
    </section>` : '';

    // Experience
    const expHTML = exp.length ? `
    <section class="pf-section" id="Experience">
      <div class="pf-section-inner">
        <div class="section-label reveal">Work History</div>
        <h2 class="section-title reveal" style="transition-delay:.1s">My <em>experience</em></h2>
        <div class="timeline">
          ${exp.map((e,i)=>`
          <div class="tl-item reveal" style="transition-delay:${i*.12}s">
            <div class="tl-dot"></div>
            <div class="tl-header">
              <div>
                <h3 class="tl-title">${safe(e.title)}</h3>
                <div class="tl-company">${safe(e.company)}</div>
              </div>
              <div class="tl-period">${safe(e.start)} → ${safe(e.end)}</div>
            </div>
            ${e.desc ? `<div class="tl-desc">${safe(e.desc)}</div>` : ''}
          </div>`).join('')}
        </div>
      </div>
    </section>` : '';

    // Projects
    const projHTML = proj.length ? `
    <section class="pf-section" id="Projects">
      <div class="pf-section-inner">
        <div class="section-label reveal">Selected Work</div>
        <h2 class="section-title reveal" style="transition-delay:.1s">Things I've <em>built</em></h2>
        <div class="projects-grid">
          ${proj.map((p,i) => {
            const tags = (p.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
            const media = p.image
              ? `<img src="${p.image}" alt="${safe(p.name)}" loading="lazy">`
              : `<div class="proj-placeholder"><div class="pi">${initials(p.name)||'?'}</div></div>`;
            const overlayBtns = [
              p.link   && `<a class="ov-btn" href="${safe(p.link)}"   target="_blank">${SVG.link}   Live Demo</a>`,
              p.github && `<a class="ov-btn" href="${safe(p.github)}" target="_blank">${SVG.github} Code</a>`,
            ].filter(Boolean).join('');
            const bottomLinks = [
              p.link   && `<a class="proj-link" href="${safe(p.link)}"   target="_blank">${SVG.link}   Live Demo</a>`,
              p.github && `<a class="proj-link" href="${safe(p.github)}" target="_blank">${SVG.github} GitHub</a>`,
            ].filter(Boolean).join('');
            return `
            <div class="proj-card reveal" style="transition-delay:${i*.1}s">
              <div class="proj-media">
                ${media}
                ${overlayBtns ? `<div class="proj-overlay">${overlayBtns}</div>` : ''}
              </div>
              <div class="proj-body">
                ${tags.length ? `<div class="proj-tags">${tags.map(t=>`<span class="proj-tag">${safe(t)}</span>`).join('')}</div>` : ''}
                <h3>${safe(p.name)}</h3>
                ${p.desc ? `<p>${safe(p.desc)}</p>` : ''}
                ${bottomLinks ? `<div class="proj-links">${bottomLinks}</div>` : ''}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </section>` : '';

    // Education
    const eduHTML = edu.length ? `
    <section class="pf-section" id="Education">
      <div class="pf-section-inner">
        <div class="section-label reveal">Academic</div>
        <h2 class="section-title reveal" style="transition-delay:.1s">My <em>education</em></h2>
        <div class="edu-grid">
          ${edu.map((e,i)=>`
          <div class="edu-card reveal" style="transition-delay:${i*.1}s">
            <div class="edu-icon">🎓</div>
            <h3>${safe(e.degree)}</h3>
            <div class="edu-school">${safe(e.school)}</div>
            <div class="edu-year">${safe(e.year)}</div>
            ${e.extra ? `<div class="edu-extra">✦ ${safe(e.extra)}</div>` : ''}
          </div>`).join('')}
        </div>
      </div>
    </section>` : '';

    // Achievements
    const achHTML = ach.length ? `
    <section class="pf-section">
      <div class="pf-section-inner">
        <div class="section-label reveal">Recognition</div>
        <h2 class="section-title reveal" style="transition-delay:.1s">Achievements & <em>certifications</em></h2>
        <div class="ach-list">
          ${ach.map((a,i)=>`
          <div class="ach-item reveal" style="transition-delay:${i*.07}s">
            <div class="ach-icon">🏅</div>
            <div class="ach-text">${safe(a)}</div>
          </div>`).join('')}
        </div>
      </div>
    </section>` : '';

    // Contact
    const contacts = [
      d.email    && {icon:'📧', label:'Email',    val:d.email,    href:`mailto:${d.email}`},
      d.phone    && {icon:'📱', label:'Phone',    val:d.phone,    href:`tel:${d.phone}`},
      d.location && {icon:'📍', label:'Location', val:d.location, href:null},
      d.linkedin && {icon:'💼', label:'LinkedIn', val:'View Profile', href:d.linkedin},
      d.github   && {icon:'💻', label:'GitHub',   val:'View Profile', href:d.github},
      d.website  && {icon:'🌐', label:'Website',  val:d.website,  href:d.website},
    ].filter(Boolean);

    const contactHTML = contacts.length ? `
    <section class="pf-section" id="Contact">
      <div class="pf-section-inner">
        <div class="section-label reveal">Get In Touch</div>
        <h2 class="section-title reveal" style="transition-delay:.1s">Let's <em>connect</em></h2>
        <div class="contact-grid">
          ${contacts.map((c,i)=>`
          <${c.href?`a href="${safe(c.href)}" target="_blank"`:'div'} class="contact-card reveal" style="transition-delay:${i*.08}s">
            <div class="contact-icon">${c.icon}</div>
            <div>
              <div class="contact-label">${c.label}</div>
              <div class="contact-value">${safe(c.val)}</div>
            </div>
          </${c.href?'a':'div'}>`).join('')}
        </div>
      </div>
    </section>` : '';

    const badgeCount = exp.length || proj.length;
    const badgeLabel = exp.length ? 'Roles' : 'Projects';

    return `
    <nav class="pf-nav" id="pf-nav">
      <div class="pf-nav-logo">${safe(d.name)}</div>
      <div class="pf-nav-links">${navLinks.map(l=>`<a href="#${l}">${l}</a>`).join('')}</div>
      ${d.email ? `<a class="pf-nav-cta" href="mailto:${safe(d.email)}">Hire me</a>` : '<span></span>'}
    </nav>

    <section class="pf-hero">
      <div class="hero-bg-orb orb1"></div>
      <div class="hero-bg-orb orb2"></div>
      <div class="hero-grid"></div>
      <div class="pf-hero-inner">
        <div class="pf-hero-text">
          <div class="pf-avail"><span class="dot"></span> Available for new opportunities</div>
          <div class="pf-hero-role">${safe(d.role)}</div>
          <h1 class="pf-hero-name">${safe(d.name)}</h1>
          <p class="pf-hero-bio">${safe(d.bio)}</p>
          <div class="pf-hero-actions">
            ${d.email  ? `<a class="btn-primary"  href="mailto:${safe(d.email)}">${SVG.mail} Say Hello</a>` : ''}
            ${d.github ? `<a class="btn-outline" href="${safe(d.github)}" target="_blank">${SVG.github} GitHub</a>` : ''}
          </div>
          ${socials ? `<div class="pf-socials">${socials}</div>` : ''}
        </div>
        <div class="pf-avatar-wrap">
          <div class="pf-avatar-ring">
            <div class="pf-avatar-inner">${avatarInner}</div>
          </div>
          ${badgeCount ? `<div class="pf-avatar-badge"><div class="bn">${badgeCount}+</div><div class="bl">${badgeLabel}</div></div>` : ''}
        </div>
      </div>
    </section>

    ${skillsHTML}${expHTML}${projHTML}${eduHTML}${achHTML}${contactHTML}

    <footer class="pf-footer">
      <div class="pf-footer-logo">Webbio</div>
      <div class="pf-footer-text">© ${new Date().getFullYear()} ${safe(d.name)}</div>
      <a class="pf-footer-link" href="builder.html">Built with <em>Webbio</em> ✦</a>
    </footer>`;
  }

  function initReveal() {
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
    }, {threshold:0.07});
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
  }

  function initNav() {
    const nav = document.getElementById('pf-nav');
    if (!nav) return;
    const onScroll = () => nav.classList.toggle('scrolled', window.scrollY > 40);
    window.addEventListener('scroll', onScroll, {passive:true});
    onScroll();
  }

  function showNotFound() {
    document.getElementById('loader').classList.add('hide');
    setTimeout(() => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('not-found').style.display = 'flex';
    }, 500);
  }

  async function render() {
    const username = getUsername();
    if (!username) { showNotFound(); return; }

    // Load from Firestore via username → uid lookup
    let pd = null;
    try {
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js");
      const { getFirestore, doc, getDoc, collection, query, where, getDocs } = await import("https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js");

      // ── YOUR FIREBASE CONFIG ──────────────────────────────────
      const firebaseConfig = {
  apiKey: "AIzaSyDUtoO-mmuM8SXtktlnW4_CKbhxiym8w78",
  authDomain: "webtech-4557a.firebaseapp.com",
  projectId: "webtech-4557a",
  storageBucket: "webtech-4557a.firebasestorage.app",
  messagingSenderId: "55026045202",
  appId: "1:55026045202:web:f601b96e9695809ece23cb"
};

      // ─────────────────────────────────────────────────────────

      const app = initializeApp(firebaseConfig, 'portfolio-view');
      const db = getFirestore(app);

      // Look up uid from username
      const unameSnap = await getDoc(doc(db, 'usernames', username));
      if (unameSnap.exists()) {
        const uid = unameSnap.data().uid;
        const pfSnap = await getDoc(doc(db, 'portfolios', uid));
        if (pfSnap.exists()) {
          const raw = pfSnap.data();
          // Normalize into expected pd shape {data: {...}, template: '...'}
          pd = {
            template: raw.template || 'minimal',
            data: {
              name: raw.name, role: raw.role, username: raw.username,
              avatar: raw.avatar || '', email: raw.email, phone: raw.phone,
              location: raw.location, linkedin: raw.linkedin, github: raw.github,
              twitter: raw.twitter, website: raw.website, bio: raw.bio,
              skills: raw.skills || [], experiences: raw.experiences || [],
              education: raw.education || [], projects: raw.projects || [],
              achievements: raw.achievements || [], interests: raw.interests || ''
            }
          };
        }
      }
    } catch(e) {
      console.error('Firebase load error:', e);
    }

    setTimeout(() => {
      document.getElementById('loader').classList.add('hide');
      setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
        if (!pd) { showNotFound(); return; }
        document.title = (pd.data?.name || username) + ' — Portfolio';
        try { history.replaceState({}, '', '/' + username); } catch(e) {}
        const root = document.getElementById('pf-root');
        root.innerHTML = buildHTML(pd);
        root.style.display = 'block';
        requestAnimationFrame(() => { initReveal(); initNav(); });
      }, 500);
    }, 1100);
  }

  render();
</script>
</body>
</html>
